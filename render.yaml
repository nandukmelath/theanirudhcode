services:
  - type: web
    name: theanirudhcode
    runtime: node
    plan: free
    buildCommand: npm install && node prisma/migrate-new-features.js && node prisma/migrate-phase3.js
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: PRACTITIONER_TZ_OFFSET
        value: "+05:30"
      - key: RESEND_FROM
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRY
        value: 7d
      - key: ADMIN_PASSWORD
        sync: false
      # ── Supabase ──────────────────────────────────────
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      # ── Email (Resend) ────────────────────────────────
      - key: RESEND_API_KEY
        sync: false
      # ── Email (SMTP / Gmail fallback) ─────────────────
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      # ── WhatsApp Cloud API ────────────────────────────
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_ID
        sync: false
      - key: WHATSAPP_ADMIN_NUMBER
        sync: false
      # ── Google Calendar (optional) ────────────────────
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
