<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>Forgot Password — theanirudhcode</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Tenor+Sans&family=Barlow:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
:root{--black:#070707;--black2:#0e0e0e;--black3:#141414;--gold:#c8a951;--gold2:#e2c97e;--gold-d:rgba(200,169,81,.15);--white:#f8f4ec;--muted:rgba(248,244,236,.72);--faint:rgba(248,244,236,.34);--amber:#c8733a;--line:rgba(200,169,81,.16)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:var(--black);color:var(--white);font-family:'Barlow',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.auth-logo{font-family:'Cormorant',serif;font-size:20px;font-weight:300;letter-spacing:.14em;color:var(--white);text-decoration:none;margin-bottom:48px;display:flex;align-items:center;gap:9px}
.auth-gem{width:8px;height:8px;background:var(--gold);transform:rotate(45deg);flex-shrink:0}
.auth-box{background:var(--black2);border:1px solid var(--line);padding:clamp(32px,5vw,48px);max-width:440px;width:min(100%,440px)}
.auth-box h2{font-family:'Cormorant',serif;font-size:clamp(26px,3.5vw,36px);font-weight:300;margin-bottom:6px}
.auth-box h2 em{color:var(--gold2);font-style:italic}
.auth-sub{color:var(--muted);font-size:14px;margin-bottom:28px;font-weight:300;line-height:1.7}
.finput{width:100%;padding:14px 16px;background:var(--black3);border:1px solid var(--line);color:var(--white);font-family:'Barlow',sans-serif;font-size:14px;margin-bottom:12px;outline:none;transition:border-color .3s;font-weight:300}
.finput:focus{border-color:rgba(200,169,81,.4)}
.finput::placeholder{color:var(--faint)}
.fsubmit{width:100%;padding:16px;background:var(--gold);border:none;color:var(--black);font-family:'Tenor Sans',sans-serif;font-size:12px;letter-spacing:.22em;text-transform:uppercase;margin-top:8px;transition:all .35s;cursor:pointer;display:flex;align-items:center;justify-content:center}
.fsubmit:hover{background:var(--gold2)}
.fsubmit:disabled{opacity:.6;cursor:default}
.auth-link{display:block;text-align:center;margin-top:20px;font-size:13px;color:var(--muted);font-weight:300}
.auth-link a{color:var(--gold2);text-decoration:none;transition:color .3s}
.auth-link a:hover{color:var(--gold)}
.auth-error{background:rgba(200,115,58,.1);border:1px solid rgba(200,115,58,.3);padding:12px 16px;font-size:13px;color:var(--amber);margin-bottom:16px;display:none}
.auth-success{background:rgba(111,191,115,.06);border:1px solid rgba(111,191,115,.3);padding:16px;font-size:14px;color:#6fbf73;line-height:1.7;display:none}
@media(max-width:540px){body{justify-content:flex-start;padding-top:48px;padding-bottom:48px}.auth-logo{margin-bottom:28px}}
</style>
</head>
<body>

<a href="/" class="auth-logo"><div class="auth-gem"></div>theanirudhcode</a>

<div class="auth-box">
  <h2>Reset <em>password</em></h2>
  <p class="auth-sub">Enter your account email and we'll send you a link to reset your password.</p>
  <div class="auth-error" id="auth-error"></div>
  <div class="auth-success" id="auth-success"></div>
  <form id="forgot-form">
    <input class="finput" type="email" name="email" placeholder="Email address" required autocomplete="email">
    <button type="submit" class="fsubmit" id="submit-btn"><span>Send Reset Link</span></button>
  </form>
  <p class="auth-link"><a href="/login">Back to Sign In</a></p>
</div>

<script>
document.getElementById('forgot-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const errEl = document.getElementById('auth-error');
  const okEl  = document.getElementById('auth-success');
  const email = e.target.email.value;

  btn.disabled = true;
  btn.querySelector('span').textContent = 'Sending…';
  errEl.style.display = 'none';
  okEl.style.display  = 'none';

  try {
    const res = await fetch('/api/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    const data = await res.json();
    if (res.ok) {
      okEl.textContent  = data.message;
      okEl.style.display = 'block';
      e.target.reset();
    } else {
      errEl.textContent   = data.error;
      errEl.style.display = 'block';
    }
  } catch {
    errEl.textContent   = 'Connection error. Please try again.';
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.querySelector('span').textContent = 'Send Reset Link';
  }
});
</script>
</body>
</html>
