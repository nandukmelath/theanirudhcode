<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#070707">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>Forgot Password — theanirudhcode</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Tenor+Sans&family=Barlow:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
:root{--black:#070707;--black2:#0e0e0e;--black3:#141414;--gold:#c8a951;--gold2:#e2c97e;--gold-d:rgba(200,169,81,.15);--gold-g:rgba(200,169,81,.35);--white:#f8f4ec;--muted:rgba(248,244,236,.72);--faint:rgba(248,244,236,.34);--amber:#c8733a;--line:rgba(200,169,81,.16)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
body{background:var(--black);color:var(--white);font-family:'Barlow',sans-serif;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:clamp(16px,4vw,32px);position:relative;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(200,169,81,.06),transparent 60%);pointer-events:none;z-index:0}
.auth-logo{position:relative;z-index:1;font-family:'Cormorant',serif;font-size:clamp(18px,2.2vw,22px);font-weight:300;letter-spacing:.16em;color:var(--white);text-decoration:none;margin-bottom:clamp(28px,5vh,48px);display:flex;align-items:center;gap:10px;opacity:.92}
.auth-gem{width:8px;height:8px;background:var(--gold);transform:rotate(45deg);flex-shrink:0;box-shadow:0 0 16px rgba(200,169,81,.4)}
.auth-box{position:relative;z-index:1;background:linear-gradient(180deg,rgba(20,20,20,.78),rgba(14,14,14,.62));backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border:1px solid rgba(200,169,81,.18);border-radius:20px;box-shadow:0 32px 80px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.03),inset 0 1px 0 rgba(255,255,255,.06);padding:clamp(28px,5vw,44px);max-width:440px;width:min(100%,440px)}
.auth-box h2{font-family:'Cormorant',serif;font-size:clamp(28px,4vw,38px);font-weight:300;line-height:1.15;margin-bottom:8px;letter-spacing:-.01em}
.auth-box h2 em{color:var(--gold2);font-style:italic;font-weight:400}
.auth-sub{color:var(--muted);font-size:clamp(13px,1.4vw,14px);margin-bottom:clamp(20px,3.5vw,28px);font-weight:300;line-height:1.6}
.finput{width:100%;min-height:48px;padding:14px 16px;background:rgba(7,7,7,.5);border:1px solid rgba(200,169,81,.14);border-radius:12px;color:var(--white);font-family:'Barlow',sans-serif;font-size:15px;margin-bottom:12px;outline:none;transition:border-color .25s,background .25s,box-shadow .25s;font-weight:300;-webkit-appearance:none;appearance:none}
.finput:hover{border-color:rgba(200,169,81,.24);background:rgba(7,7,7,.65)}
.finput:focus{border-color:rgba(200,169,81,.55);background:rgba(7,7,7,.78);box-shadow:0 0 0 3px rgba(200,169,81,.10)}
.finput::placeholder{color:var(--faint);font-weight:300}
.finput:-webkit-autofill,.finput:-webkit-autofill:hover,.finput:-webkit-autofill:focus{-webkit-text-fill-color:var(--white);-webkit-box-shadow:0 0 0 1000px rgba(7,7,7,.78) inset;caret-color:var(--white)}
.fsubmit{width:100%;min-height:50px;padding:14px 20px;background:linear-gradient(135deg,var(--gold),#b89940);border:1px solid rgba(255,255,255,.18);border-radius:999px;color:var(--black);font-family:'Tenor Sans',sans-serif;font-size:12px;letter-spacing:.22em;text-transform:uppercase;margin-top:10px;transition:transform .2s,box-shadow .25s,opacity .2s;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 8px 24px rgba(200,169,81,.22),inset 0 1px 0 rgba(255,255,255,.35)}
.fsubmit:hover{transform:translateY(-1px);box-shadow:0 14px 36px rgba(200,169,81,.36),inset 0 1px 0 rgba(255,255,255,.45)}
.fsubmit:active{transform:translateY(0)}
.fsubmit:disabled{opacity:.55;transform:none;cursor:not-allowed}
.auth-link{display:block;text-align:center;margin-top:18px;font-size:13px;color:var(--muted);font-weight:300}
.auth-link a{color:var(--gold2);text-decoration:none;transition:color .25s;font-weight:400}
.auth-link a:hover{color:var(--gold)}
.auth-error{background:rgba(200,115,58,.10);border:1px solid rgba(200,115,58,.32);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--amber);margin-bottom:14px;display:none;line-height:1.5}
.auth-divider{display:flex;align-items:center;gap:14px;margin:18px 0;color:var(--faint);font-size:10px;letter-spacing:.22em;text-transform:uppercase;font-family:'Tenor Sans',sans-serif}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(200,169,81,.18),transparent)}
@media(max-width:540px){body{justify-content:flex-start;padding-top:max(40px,env(safe-area-inset-top));padding-bottom:max(40px,env(safe-area-inset-bottom))}.auth-logo{margin-bottom:24px}.auth-box{border-radius:18px}.finput{font-size:16px;min-height:52px}.fsubmit{min-height:54px}}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}

/* ═══════ iOS GLASS — universal buttons ═══════ */
button:not(.hamburger):not(.modal-close):not(.mclose):not(.auth-close):not(.btn-modal-cancel):not(.btn-cancel):not(.mc){
  border-radius:999px;
  backdrop-filter:blur(14px) saturate(180%);
  -webkit-backdrop-filter:blur(14px) saturate(180%);
  box-shadow:0 4px 14px rgba(0,0,0,.18),inset 0 1px 0 rgba(255,255,255,.08);
  transition:all .3s
}
button:not(.hamburger):not(.modal-close):not(.mclose):not(.auth-close):not(.btn-modal-cancel):not(.btn-cancel):not(.mc):hover{
  transform:translateY(-1px);
  box-shadow:0 8px 22px rgba(200,169,81,.18),inset 0 1px 0 rgba(255,255,255,.12)
}
.logout-btn,.tab-btn,.action-btn,.share-btn,.btn-ghost,.btn-reschedule,.btn-modal-cancel,.btn-cancel{
  background:linear-gradient(135deg,rgba(255,255,255,.04),rgba(255,255,255,.01))!important
}
.login-btn,.save-btn,.modal-btn,.btn-modal-save,.btn-book-first,.btn-book-new,.btn-home,.btn-gem{
  background:linear-gradient(135deg,var(--gold,#c8a951),#b89940)!important;
  border:1px solid rgba(255,255,255,.18)!important
}
.connect-btn,.export-btn{
  background:linear-gradient(135deg,rgba(200,169,81,.10),rgba(200,169,81,.02))!important
}

</style>
</head>
<body>

<a href="/" class="auth-logo"><div class="auth-gem"></div>theanirudhcode</a>

<div class="auth-box">
  <h2>Reset <em>password</em></h2>
  <p class="auth-sub">Enter your account email and we'll send you a link to reset your password.</p>
  <div class="auth-error" id="auth-error"></div>
  <div class="auth-success" id="auth-success"></div>
  <form id="forgot-form">
    <input class="finput" type="email" name="email" placeholder="Email address" required autocomplete="email">
    <button type="submit" class="fsubmit" id="submit-btn"><span>Send Reset Link</span></button>
  </form>
  <p class="auth-link"><a href="/login">Back to Sign In</a></p>
</div>

<script>
document.getElementById('forgot-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const errEl = document.getElementById('auth-error');
  const okEl  = document.getElementById('auth-success');
  const email = e.target.email.value;

  btn.disabled = true;
  btn.querySelector('span').textContent = 'Sending…';
  errEl.style.display = 'none';
  okEl.style.display  = 'none';

  try {
    const res = await fetch('/api/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    const data = await res.json();
    if (res.ok) {
      okEl.textContent  = data.message;
      okEl.style.display = 'block';
      e.target.reset();
    } else {
      errEl.textContent   = data.error;
      errEl.style.display = 'block';
    }
  } catch {
    errEl.textContent   = 'Connection error. Please try again.';
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.querySelector('span').textContent = 'Send Reset Link';
  }
});
</script>
</body>
</html>
