[build]
builder = "nixpacks"
buildCommand = "npm install && npx prisma generate && node prisma/migrate-new-features.js && node prisma/migrate-phase3.js && node prisma/migrate-phase5.js"

[deploy]
startCommand = "node server.js"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
